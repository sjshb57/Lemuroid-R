name: Build Unsigned Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build from'
        required: false
        default: 'main'

jobs:

  build:
    name: Build Unsigned APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Assemble Unsigned Release
        run: ./gradlew assembleFreeDynamicUnsignedRelease

      - name: Upload Unsigned APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-unsigned
          path: lemuroid-app/build/outputs/apk/freeDynamic/unsignedRelease/lemuroid-app-free-dynamic-unsigned-release.apk
          retention-days: 7
