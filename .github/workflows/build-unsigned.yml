name: Build Unsigned Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build from'
        required: false
        default: 'main'

jobs:

  build:
    name: Build Unsigned APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
        with:
          ref: ${{ github.event.inputs.branch }}
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Assemble Unsigned Release
        run: ./gradlew assembleFreeDynamicUnsignedRelease

      - name: Upload Unsigned APK
        uses: actions/upload-artifact@v3.1.0
        with:
          name: apk-unsigned
          path: lemuroid-app/build/outputs/apk/freeDynamic/unsignedRelease/lemuroid-app-free-dynamic-unsigned-release.apk
          retention-days: 7
